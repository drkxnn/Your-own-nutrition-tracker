<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#09090b" />
    <title>Nutrition Tracker</title>
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/svg+xml" href="/icon-192.svg" />
    <link rel="apple-touch-icon" href="/icon-192.svg" />
  </head>
  <body class="bg-zinc-950 text-zinc-50 font-sans antialiased">
    <div id="app" class="w-full max-w-md mx-auto min-h-screen flex flex-col relative">
      <div id="main-view" class="flex-1 flex flex-col"></div>
      <div id="sticky-summary" class="fixed bottom-0 left-0 right-0 bg-zinc-950 border-t border-zinc-900 z-20 pb-safe hidden"></div>
    </div>
    
    <div id="add-entry-modal" class="fixed inset-0 bg-zinc-950 z-50 hidden flex-col overflow-y-auto pb-safe"></div>
    
    <script type="module" src="/src/main.ts"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch(err => {
            console.log('SW registration failed: ', err);
          });
        });
      }
    </script>
  </body>
</html>
